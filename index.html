<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habla - Experiencia Pro Interactiva</title>
    <style>
        /* Variables de diseño basadas en tu logo */
        :root {
            --bg-color: #0a0a0a;
            --primary-color: #a3e635; /* El verde lima/viche de tu logo */
            --text-color: #ffffff;
            --accent-glow: rgba(163, 230, 53, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Cursor Personalizado Interactivo */
        #custom-cursor {
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            position: fixed;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 9999;
            transition: width 0.2s, height 0.2s, background-color 0.2s;
        }

        /* Contenedor del fondo 3D */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: all;
        }

        /* Capa de interfaz de usuario por encima del 3D */
        .ui-layer {
            position: relative;
            z-index: 2;
            pointer-events: none; /* Permite que el mouse interactúe con el fondo 3D */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Header e Interfaz */
        header {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        /* Logo replicado con código CSS exacto al de tu imagen */
        .logo {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--primary-color);
            letter-spacing: -2px;
            text-transform: lowercase;
            text-shadow: 0 0 20px var(--accent-glow);
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
            text-shadow: 0 0 35px var(--primary-color);
        }

        .nav-links {
            display: flex;
            gap: 30px;
            pointer-events: auto;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s, text-shadow 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary-color);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        /* Contenido Principal (Hero Section) */
        main {
            padding: 0 10% 10% 10%;
            max-width: 600px;
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        h1 span {
            color: var(--primary-color);
            text-shadow: 0 0 15px var(--accent-glow);
        }

        p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* Botón Pro con interacción */
        .cta-btn {
            display: inline-block;
            padding: 15px 35px;
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            pointer-events: auto;
            box-shadow: 0 0 15px var(--accent-glow);
            transition: all 0.3s ease;
        }

        .cta-btn:hover {
            background-color: var(--primary-color);
            color: var(--bg-color);
            box-shadow: 0 0 30px var(--primary-color);
            transform: translateY(-3px);
        }

        /* Cambios en el cursor al pasar por elementos clickeables */
        .interactive-hover:hover ~ #custom-cursor {
            width: 40px;
            height: 40px;
            background-color: rgba(163, 230, 53, 0.1);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="custom-cursor"></div>

    <div id="canvas-container"></div>

    <div class="ui-layer">
        <header>
            <div class="logo interactive-hover">habla</div>
            <nav class="nav-links">
                <a href="#" class="interactive-hover">Inicio</a>
                <a href="#" class="interactive-hover">Proyectos</a>
                <a href="#" class="interactive-hover">Contacto</a>
            </nav>
        </header>

        <main>
            <h1>Llevando tu entorno al <span>Siguiente Nivel</span></h1>
            <p>Una interfaz disruptiva diseñada para interactuar con tus movimientos. Mueve el cursor por la pantalla para distorsionar la red e interactuar con el ecosistema digital.</p>
            <a href="#" class="cta-btn interactive-hover">Explorar Experiencia</a>
        </main>
    </div>

    <script>
        // --- 1. LÓGICA DEL CURSOR PERSONALIZADO ---
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Efecto expandir cursor en enlaces
        const hovers = document.querySelectorAll('.interactive-hover');
        hovers.forEach(element => {
            element.addEventListener('mouseenter', () => {
                cursor.style.width = '50px';
                cursor.style.height = '50px';
                cursor.style.backgroundColor = 'rgba(163, 230, 53, 0.2)';
            });
            element.addEventListener('mouseleave', () => {
                cursor.style.width = '20px';
                cursor.style.height = '20px';
                cursor.style.backgroundColor = 'transparent';
            });
        });


        // --- 2. LÓGICA DEL ENTORNO 3D INTERACTIVO (Three.js) ---
        const container = document.getElementById('canvas-container');
        
        // Escena y Cámara
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 4;

        // Renderizador
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Geometría del objeto 3D (Un Toroide complejo/Reticulado digital)
        const geometry = new THREE.TorusGeometry(1.3, 0.4, 30, 100);
        
        // Material estilo Matriz/Holograma Verde Lima como el logo
        const material = new THREE.MeshBasicMaterial({
            color: 0xa3e635,
            wireframe: true, // Modo red de vectores para estilo tecnológico y pro
            transparent: true,
            opacity: 0.85
        });

        // Crear la malla 3D
        const mesh = new THREE.Mesh(geometry, material);
        // Posicionar el objeto hacia la derecha para que no tape el texto de la izquierda
        if(window.innerWidth > 768) {
            mesh.position.x = 1.5;
        }
        scene.add(mesh);

        // Guardar las posiciones originales de los vértices para la interacción matemática
        const originalPositions = geometry.attributes.position.clone();

        // Variables para seguir el movimiento del mouse
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;

        document.addEventListener('mousemove', (event) => {
            // Coordenadas normalizadas del mouse (-1 a 1)
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        // Bucle de Animación (Render Loop a 60 FPS)
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();

            // 1. Rotación automática continua (Vida propia)
            mesh.rotation.x = elapsedTime * 0.2;
            mesh.rotation.y = elapsedTime * 0.3;

            // 2. Orientación/Seguimiento suave del objeto hacia el mouse
            targetX += (mouseX - targetX) * 0.05;
            targetY += (mouseY - targetY) * 0.05;
            mesh.rotation.y += targetX * 0.5;
            mesh.rotation.x += -targetY * 0.5;

            // 3. Deformación matemática interactiva de los vértices al pasar el mouse
            const positionAttribute = geometry.attributes.position;
            
            for (let i = 0; i < positionAttribute.count; i++) {
                // Obtener coordenadas originales del vértice
                const vx = originalPositions.getX(i);
                const vy = originalPositions.getY(i);
                const vz = originalPositions.getZ(i);

                // Crear un efecto de onda digital basado en el tiempo y la posición del mouse
                const wave = Math.sin(vx * 2 + elapsedTime * 3) * Math.cos(vy * 2 + elapsedTime * 2) * (targetX * 0.25);
                
                // Aplicar la alteración al eje Z
                positionAttribute.setZ(i, vz + wave);
            }
            // Indicar a Three.js que actualice los vértices en pantalla
            positionAttribute.needsUpdate = true;

            renderer.render(scene, camera);
        }

        animate();

        // Adaptar al cambiar el tamaño de la ventana (Responsive)
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);

            if(window.innerWidth <= 768) {
                mesh.position.x = 0; // Centrar en móviles
            } else {
                mesh.position.x = 1.5;
            }
        });
    </script>
</body>
</html>
